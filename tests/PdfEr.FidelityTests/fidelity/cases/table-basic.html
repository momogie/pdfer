<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Table Test</title>
    <style>
        body {
            font-family: DejaVu Sans, Arial, sans-serif;
            font-size: 11pt;
            margin: 2cm;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.5cm 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.2cm;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>
<body>
    <h1>Basic Table Test</h1>
    <p>This is a simple table with header row and data rows.</p>

    <table>
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
                <th>Header 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Cell 1-1</td>
                <td>Cell 1-2</td>
                <td>Cell 1-3</td>
            </tr>
            <tr>
                <td>Cell 2-1</td>
                <td>Cell 2-2</td>
                <td>Cell 2-3</td>
            </tr>
            <tr>
                <td>Cell 3-1</td>
                <td>Cell 3-2</td>
                <td>Cell 3-3</td>
            </tr>
            <tr>
                <td>Cell 4-1</td>
                <td>Cell 4-2</td>
                <td>Cell 4-3</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
